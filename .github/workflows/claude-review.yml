name: Claude PR Review

on:
  issue_comment:
    types: [created]

permissions:
  contents: read
  pull-requests: write
  issues: write
  id-token: write

jobs:
  claude-review:
    name: Claude Code Review
    runs-on: ubuntu-latest
    if: |
      github.event.issue.pull_request &&
      (github.event.comment.body == 'review' || github.event.comment.body == '@anko20094 review') &&
      github.actor != 'dependabot[bot]'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: refs/pull/${{ github.event.issue.number }}/head
          fetch-depth: 0

      - name: Claude PR Review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          prompt: |
            You are a senior Rails engineer reviewing a PR for a web platform with admin panel.

            Stack: Rails 7.2, PostgreSQL, Redis, Sidekiq 7.3, Pundit (authorization), ActiveAdmin 3.4, Devise (auth), Carrierwave (file uploads), Chartkick (charts), Hotwire (Turbo + Stimulus), TinyMCE, Pagy, Globalize (translations), pg_search, Capistrano.

            Do NOT use any skills or slash commands.

            Run these bash commands directly:
            1. `gh pr diff ${{ github.event.issue.number }}` — to get the diff
            2. `gh pr view ${{ github.event.issue.number }}` — to get PR title/description
            3. `COMMIT_SHA=$(gh pr view ${{ github.event.issue.number }} --json headRefOid -q .headRefOid)` — to get the head commit SHA

            Then for EACH issue found, post a SEPARATE inline comment on the exact line:
            `gh api repos/$GITHUB_REPOSITORY/pulls/${{ github.event.issue.number }}/comments --method POST -f body="<comment>" -f commit_id="$COMMIT_SHA" -f path="<file>" -F line=<line> -f side="RIGHT"`

            One gh api call per issue. Do NOT batch multiple issues into one comment.

            Finally, post one concise summary (3-5 sentences max):
            `gh pr comment ${{ github.event.issue.number }} --body "<approve / request changes + brief summary>"`

            Focus on:
            1. **Bugs & logic errors** — incorrect conditions, edge cases, nil handling
            2. **Security** — missing Pundit checks, mass assignment vulnerabilities, ActiveAdmin access control
            3. **N+1 queries** — missing `.includes`, `.preload`, or DB indexes
            4. **Sidekiq jobs** — idempotency, error handling, retry safety
            5. **File uploads (Carrierwave)** — missing validations, MIME type checks, size limits
            6. **Rails conventions** — fat models/controllers, misuse of callbacks

            Skip trivial style issues — Rubocop handles those.
            If no issues found, skip inline comments and post only the summary saying the PR looks good.
